<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Подбор оборудования{% endblock %}</title>

  <style>
    :root{
      --bg:#f6f7f9;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#eb564f;   
      --accent2:#111827;
      --radius:14px;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color:var(--text);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:1080px; margin:0 auto; padding:18px 16px 64px}

    /* top header */
    .top{
      display:flex; align-items:center; justify-content:space-between;
      gap:16px;
      padding:14px 16px;
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .brand{
      display:flex; align-items:center; gap:12px;
    }
    .mark{
      width:34px; height:34px; border-radius:10px;
      background: var(--accent);
    }
    .brand-title{font-weight:800; letter-spacing:.2px}
    .brand-sub{font-size:12px; color:var(--muted); margin-top:2px}
    .nav{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end}
    .link{
      display:inline-flex; align-items:center; gap:8px;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background: #fff;
      font-weight:700;
      font-size:13px;
    }
    .link:hover{border-color:#cbd5e1}
    .link.primary{
      border-color: rgba(214,31,44,.35);
      background: rgba(214,31,44,.06);
      color: var(--accent2);
    }
    .link.danger{
      border-color: rgba(214,31,44,.35);
      background: rgba(214,31,44,.10);
      color: var(--accent2);
    }
    .pill{
      display:inline-flex; align-items:center;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--muted);
      font-weight:700;
      font-size:13px;
    }

    /* breadcrumbs */
    .crumbs{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
    }
    .crumbs a{color:var(--muted); text-decoration:underline}
    .crumbs .sep{margin:0 8px}

    /* cards */
    .card{
      margin-top:14px;
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card-head{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
    }
    .card-title{margin:0; font-size:18px; font-weight:900}
    .card-sub{margin-top:6px; color:var(--muted); font-size:13px}
    .card-body{padding:18px}

    /* stepper like “01/02/03” */
    .stepper{display:flex; gap:10px; flex-wrap:wrap}
    .step{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius: 999px;
      background:#fff;
      font-weight:800;
      font-size:13px;
    }
    .step .num{
      width:28px; height:28px; border-radius:999px;
      display:grid; place-items:center;
      background: #111827;
      color:#fff;
      font-size:12px;
      letter-spacing:.3px;
    }
    .step.active{border-color: rgba(214,31,44,.35); background: rgba(29, 18, 19, 0.06)}
    .step.active .num{background: var(--accent)}

    /* lists & “download chips” */
    h3{margin:0 0 10px}
    .grid{display:grid; gap:10px}
    .chips{display:flex; gap:10px; flex-wrap:wrap}
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:800;
      font-size:13px;
    }
    .chip small{color:var(--muted); font-weight:700}
    .dot{
      width:10px; height:10px; border-radius:50%;
      background: var(--accent);
    }

    /* forms */
    .form-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px 14px;
    }
    @media (max-width: 760px){
      .form-grid{grid-template-columns:1fr}
    }
    label{display:block; font-size:12px; color:var(--muted); font-weight:800; margin:0 0 6px}
    input, select, textarea{
      width:100%;
      padding:11px 12px;
      border-radius: 12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      outline:none;
    }
    input:focus, select:focus, textarea:focus{border-color: rgba(214,31,44,.45)}
    textarea{min-height:110px; resize:vertical}
    .req{color:var(--accent)}
    .help{font-size:12px; color:var(--muted); margin-top:6px}
    .errors{color: var(--accent); font-size:12px; margin-top:6px}

    .actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; margin-top:16px}
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:11px 14px;
      border-radius: 12px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:900;
      cursor:pointer;
    }
    .btn.primary{
      border-color: rgba(214,31,44,.35);
      background: var(--accent);
      color:#fff;
    }
    .btn.primary:hover{filter:brightness(.97)}
    .btn.ghost{background:#fff}
    .checkbox{
      display:flex; gap:10px; align-items:flex-start;
      padding:12px;
      border:1px solid var(--line);
      border-radius: 12px;
      background:#fff;
      margin-top:12px;
    }
    .checkbox input{width:auto; margin-top:2px}
    .checkbox a{color:var(--accent); text-decoration:underline}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <div class="brand-title">Подбор оборудования</div>
          
        </div>
      </div>

      <div class="nav">
        <a class="link" href="/">Главная</a>
        <a class="link primary" href="/q/">Опросники</a>
        <a class="link" href="/q/handbook/">Справочник</a>

        {% if user.is_authenticated %}
          <span class="pill">{{ user.username }}</span>

          {% if user.is_staff %}
            <a class="link" href="/q/manager/submissions/">Менеджер</a>
            <a class="link" href="/q/manager/schema/">Схема БД</a>
          {% endif %}

          <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button class="link danger" type="submit">Выйти</button>
          </form>
        {% else %}
          <a class="link" href="/accounts/login/">Войти</a>
          <a class="link" href="/accounts/signup/">Регистрация</a>
        {% endif %}
      </div>
    </div>

    {% block crumbs %}{% endblock %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
